<form id="createForm" th:action="@{/customer/customer}" method="post">

    <input id="id" name="id" th:value="${customer.id}" type="hidden"/>
    <input id="version" name="version" th:value="${customer.version}" type="hidden"/>

    <fieldset>
        <legend>
            <th:block th:utext="#{customer.legend.customerName}"/>
        </legend>
        <div class="grid-row">
            <th:block th:insert="~{fragments/elements/input::inputHtmlLift('lastName','customer.lastName','customer.lastName','0')}"></th:block>
            <th:block th:insert="~{fragments/elements/input::inputHtmlLift('surName','customer.surname','customer.surName','0')}"
                      th:with="required=false,extraClass='small'">
            </th:block>
            <th:block th:insert="~{fragments/elements/input::inputHtmlLift('firstName','customer.firstName','customer.firstName','0')}"
                      th:with="required=true,extraClass='small'"></th:block>
            </th:block>
            <th:block th:insert="~{fragments/elements/input::inputHtmlLift('middleInitial','customer.middleInitial','customer.middleInitial','0')}"
                      th:with="required=false,extraClass='verysmall'"></th:block>
            <th:block th:insert="~{fragments/elements/input::inputHtmlLift('title','customer.title','customer.title','0')}"
                      th:with="required=false, extraClass='small'"></th:block>
        </div>
    </fieldset>
    <fieldset>
        <legend>
            <th:block th:utext="#{customer.legend.addressInformation}"/>
        </legend>
        <div class="grid-grid-row">
            <div class="field smaller left-center">
                <button id="lookupAddress" class="input-height-as-input-field" th:hx-get="@{'/customer/search/customer/address'}"
                        hx-target="#modal-container" hx-swap="innerHTML" th:text="#{customer.search.zipcode}">
                </button>
                <label>&nbsp;</label>
            </div>
            <div class="right-stack">
                <div style="grid-column: 1 / span 2;">
                    <th:block
                            th:insert="~{fragments/elements/input::inputHtmlLift('extraAddressInfo','customer.extraAddressInfo','customer.extraAddressInfo','0')}" th:with="required=false">
                    </th:block>

                    <div class="grid-row">
                        <th:block th:insert="~{fragments/elements/input::inputHtmlLift('street','customer.street','customer.street','0')}">
                        </th:block>
                        <th:block th:insert="~{fragments/elements/input::inputHtmlLift('streetNumber','customer.street.number','customer.streetNumber','0')}"
                                  th:with="extraClass='smaller'">
                        </th:block>
                    </div>
                    <div class="grid-row">
                        <th:block
                                th:insert="~{fragments/elements/input::inputHtmlLift('zipCode','customer.zipcode','customer.zipCode','0')}"
                                th:with="onblur='this.value=this.value.toUpperCase().replaceAll(\' \',\'\')',
                         pattern='^[1-9][0-9]{3}\\s?[A-Za-z]{2}$', extraClass='smaller'">
                        </th:block>
                        <th:block th:insert="~{fragments/elements/input::inputHtmlLift('city','customer.city','customer.city','0')}">
                        </th:block>
                    </div>
                </div>
            </div>
    </fieldset>

    <fieldset>
        <legend>
            <th:block th:utext="#{customer.legend.contactInformation}"/>
        </legend>
        <div class="grid four-cols">
            <div>
                <th:block th:insert="~{fragments/elements/input::inputHtmlLift('email','customer.email','customer.email','0')}" th:with="required=false,type='email'"></th:block>
            </div>
            <div>
                <th:block th:insert="~{fragments/elements/input::inputHtmlLift('mobilePhone','customer.mobilePhone','customer.mobilePhone','0')}" th:with="required=false"></th:block>
            </div>
            <div>
                <th:block th:insert="~{fragments/elements/input::inputHtmlLift('homePhone','customer.homePhone','customer.homePhone','0')}" th:with="required=false"></th:block>
            </div>
            <div>
                <th:block th:insert="~{fragments/elements/input::inputHtmlLift('workPhone','customer.workPhone','customer.workPhone','0')}" th:with="required=false"></th:block>
            </div>
            <div class="span-2">
                <th:block th:insert="~{fragments/elements/dropdown::propDropdown('status','customer.status', ${customer.status}, ${statusList}, true,'0')}"></th:block>
            </div>
            <div class="span-2">
                <th:block th:insert="~{fragments/elements/dropdown::propDropdown('newsletter','customer.newsletter', ${customer.newsletter}, ${ynvaluesList}, true,'0')}" th:with="required=false"></th:block>
            </div>
        </div>
    </fieldset>
    <fieldset class="grid">
        <legend>
            <th:block th:utext="#{customer.legend.emergencyInformation}"/>
        </legend>
        <th:block
                th:insert="~{fragments/elements/input::inputHtmlLift('emergencyContact','customer.emergencyContact','customer.emergencyContact','0')}" th:with="required=false"></th:block>
        <th:block
                th:insert="~{fragments/elements/input::inputHtmlLift('emergencyContactPhone','customer.emergencyContactPhone','customer.emergencyContactPhone','0')}" th:with="required=false"></th:block>
    </fieldset>
    <fieldset>
        <legend>
            <th:block th:utext="#{customer.legend.otherInformation}"/>
        </legend>
        <div class="grid">
            <th:block th:insert="~{fragments/elements/input::inputHtmlLift('ubn','customer.ubn','customer.ubn','0')}" th:with="required=false"></th:block>
            <th:block
                    th:insert="~{fragments/elements/input::inputHtmlLift('oldAddressInfo','customer.oldAddressInfo','customer.oldAddressInfo','0')}" th:with="required=false"></th:block>
        </div>
        <div class="grid">
            <th:block
                    th:insert="~{fragments/elements/input::inputHtmlLift('previousVeterinarian','customer.previousVeterinarian','customer.previousVeterinarian','0')}" th:with="required=false"></th:block>
            <th:block
                    th:insert="~{fragments/elements/input::inputHtmlLift('previousVeterinarianPhone','customer.previousVeterinarianPhone','customer.previousVeterinarianPhone','0')}" th:with="required=false"></th:block>
        </div>
    </fieldset>
    <fieldset class="grid">
        <legend><th:block th:utext="#{customer.comments}"/></legend>
        <textarea cols="110" id="comments" name="comments" rows="8" th:utext="${customer.comments}"></textarea>
    </fieldset>
</form>
