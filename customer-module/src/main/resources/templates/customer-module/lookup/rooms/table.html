<table id="show-table" data-no-export class=" striped">
    <thead>
    <tr>
        <th></th>
        <th>[[#{label.room.room}]]</th>
        <th>[[#{label.location}]]</th>
        <th>[[#{label.list.auditinfo}]]</th>
    </tr>
    </thead>
    <tbody>
    <th:block th:each="room : ${rooms}">
        <tr>
            <td class="no-sorting">
                <a th:hx-delete="'/customer/lookup/room/'+ ${room.id}" hx-target="#show-table" hx-swap="outerHTML">🗑️️️</a>
            </td>
            <td><a th:href="'/customer/lookup/room/'+ ${room.id}">[[${room.room}]]</a></td>
            <td th:text="${localMembersList.get(room.localMemberId)}"></td>
            <td>
                <small th:data-tooltip="'Created by  '+${room.addedBy}+' on ' +${#temporals.format(room.addedOn, 'dd-MM-yy')}">
                    [[${room.lastEditedBy}]] • [[${#temporals.format(room.lastEditedOn, 'dd-MM-yy')}]]
                </small>
            </td>
        </tr>
    </th:block>
    </tbody>
</table>
