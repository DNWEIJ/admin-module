<dialog id="generic-modal" class="modal-xlg" open>
    <article>
        <header>
            <div>
                <span id="notification-message-modal"></span>
            </div>
        </header>
            <th:block th:utext="${genericDialogData}"/>
        <footer>
            <div class="grid">
                <input type="button" data-target="generic-modal" onclick="toggleModal(event)" th:value="#{label.button.close}"/>
            </div>
        </footer>
    </article>
    <script>
        // called via the header HX-Trigger from backend
        document.body.addEventListener("closeModal", () => {
            const modal = document.getElementById("generic-modal")
            closeModal(modal)
            location.reload();
        });
    </script>
</dialog>
