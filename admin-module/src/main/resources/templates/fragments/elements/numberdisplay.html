<th:block th:fragment="showNumber_td(money, deskTopOnly)">
    <td class="text-align-right number-font" th:text="${#numbers.formatDecimal(money, 1, 2, 'POINT')}"
        th:style="${increaseFont != null ? 'font-size:' + increaseFont + '%' : null}"
        th:classappend="${deskTopOnly} ? 'desktop-only' : null"></td>
</th:block>


<th:block th:fragment="showNumberWithEuro_td(money, deskTopOnly,class)">
    <td th:class="${class} + ' number-font text-align-right'">
        <span>€</span>
        <span th:class="${class} + ' number-font text-align-right'" th:text="${#numbers.formatDecimal(money, 1, 2, 'POINT')}"
              th:style="${increaseFont != null ? 'font-size:' + increaseFont + '%' : null}" th:classappend="${deskTopOnly} ? 'desktop-only' : null"
              th:attr="data-field-money-total=${dataFieldMoneyTotal != null ? dataFieldMoneyTotal : null}"></span>
    </td>
</th:block>


<th:block th:fragment="showNumberAddClass_td(money, deskTopOnly, class)">
    <td th:class="${class} + ' number-font text-align-right'" th:text="${#numbers.formatDecimal(money, 1, 2, 'POINT')}"
        th:style="${increaseFont != null ? 'font-size:' + increaseFont + '%' : null}"
        th:classappend="${deskTopOnly} ? 'desktop-only' : null"></td>
</th:block>
