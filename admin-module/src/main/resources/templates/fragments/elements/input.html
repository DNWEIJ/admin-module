<th:block th:fragment="inputHtml(name, label, dbField, tabindex)"
          th:with="type=${type}?:'text', required=${required}?:true, placeholder=${placeholder}?:${label}, text=${text}?:${text}">
    <label th:for="${name}" th:text="${label}"></label>
    <input th:id="${name}" th:name="${name}" th:placeholder="${placeholder}" th:required="${required}"
           th:tabindex="${tabindex}" th:type="${type == 'wholenumber'? 'number':'number'}" th:step="${type == 'wholenumber'}?'1.0': type == 'number'?:'0.01'"  th:value="${__${dbField}__}"
           th:text="${text}"

    autocomplete="off">
</th:block>


<th:block th:fragment="inputHtmlLift(name, label, dbField, tabindex)"
          th:with="type=${type}?:'text', required=${required}?:true, pattern=${pattern}?:'',
          datacopyelement=${datacopyelement}?:'', onblur=${onblur}?:'', autofocus=${shouldFocus}?:false,
           extraClass=${extraClass}?:''">

    <div class="field" th:classappend="${extraClass}">
        <input th:id="${name}" th:name="${name}" th:required="${required}"
               th:attr="onblur=${onblur}, data-copy-element=${datacopyelement != '' ? datacopyelement : null}"
               th:autofocus="${shouldFocus}" th:pattern="${pattern}" th:tabindex="${tabindex}"
               th:type="${type == 'wholenumber'? 'number': type}"
               th:step="${type == 'wholenumber'?'1.0': (type == 'number'? '0.01':'')}"
               th:value="${__${dbField}__ ?: ''}"
               placeholder="" autocomplete="off" >
        <th:block th:if="${label == null or label.isEmpty()}">
            <label th:for="${name}"></label>
        </th:block>
        <th:block th:unless="${label == null or label.isEmpty()}">
            <label th:for="${name}" th:utext="#{${label}}"></label>
        </th:block>
    </div>
</th:block>

<th:block th:fragment="inputHtmlOptional(name, label, dbField, tabindex)"
          th:with="type=${type}?:'text'">
    <label th:for="${name}">[[${label}]]
        <input th:id="${name}" th:name="${name}" th:placeholder="${label}" th:tabindex="${tabindex}"
               th:type="${type}" th:value="${__${dbField}__}"
               autocomplete="off">
    </label>
</th:block>

<th:block th:fragment="inputHtmlNumber(name, label, dbField, tabindex)"
          th:with="required=${required}?:true">
    <label th:for="${name}">[[${label}]]
        <input th:id="${name}" th:name="${name}" th:required="${required}" th:tabindex="${tabindex}"
               th:type="${type}" th:value="${__${dbField}__}"
               autocomplete="off">
    </label>
</th:block>
