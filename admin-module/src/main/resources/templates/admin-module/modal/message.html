<span th:fragment="notification"
     id="notification-message-modal"
     role="alert"
     class="notification-message text-align-center alert"
     hx-swap-oob="true" hx-swap="outerHTML"
     th:classappend="${messageClass != null} ? ${messageClass} + ' show' : 'alert-success'"
     th:text="${message != null} ? #{${message}} : ''">
</span>
