

<div>
    <fieldset class="grid">
        <th:block th:insert="~{fragments/elements/input::inputHtmlLift('pref.insuranceCompany','localmember.pref.insuranceCompany','pref.insuranceCompany','0')}"></th:block>
        <th:block th:insert="~{fragments/elements/dropdown::dbDropdown('pref.estimatedTime','localmember.pref.estimatedTime', ${pref.estimatedTime}, ${timeList}, true,'0')}"></th:block>
        <th:block th:insert="~{fragments/elements/dropdown::propDropdown('pref.paymentMethod','localmember.pref.paymentMethod', 'pref.paymentMethod', ${paymentList}, true,'0')}"></th:block>
        <th:block th:insert="~{fragments/elements/dropdown::propDropdown('pref.agendaType','localmember.pref.Agenda', 'pref.agendaType', ${agendaTypeList}, true,'0')}"></th:block>
    </fieldset>
    <fieldset class="grid">
        <th:block th:insert="~{fragments/elements/dropdown::propDropdown('pref.mandatoryConsultReason','localmember.pref.mandatoryConsultReason', ${pref.mandatoryConsultReason}, ${yesNoList}, true,'0')}"></th:block>
        <th:block th:insert="~{fragments/elements/dropdown::propDropdown('pref.mandatoryExpireDate','localmember.pref.mandatoryExpireDate', ${pref.mandatoryExpireDate}, ${yesNoList}, true,'0')}"></th:block>
        <th:block th:insert="~{fragments/elements/dropdown::propDropdown('pref.sendOutAppointmentReminderMail','localmember.pref.sendOutAppointmentReminderMail', ${pref.sendOutAppointmentReminderMail}, ${yesNoList}, true,'0')}"></th:block>
    </fieldset>

    <fieldset>
        <summary th:text="#{localmember.pref.template}"></summary>
        <br/>
        <div th:each="template, iterStat : ${templates}">
            <div class="grid" th:if="${iterStat.index % 2 == 0}">
                <div>
                    <input type="hidden" th:name="|template[${iterStat.index}].order|" th:value="${template.order}">
                    <div class="grid-row">
                        <div class="verysmall align-center">
                            <th:block
                                    th:insert="~{fragments/elements/select::selectCheckBox('pref.template['+${iterStat.index}+'].selected',#{localmember.pref.template.selected},${template.selected},'0')}"
                                    th:with="extraClass='verysmall align-center'"></th:block>
                        </div>
                        <th:block
                                th:insert="~{fragments/elements/input::inputHtmlLift('pref.template['+${iterStat.index}+'].title','localmember.pref.template.title','template.title','0')}"></th:block>
                    </div>
                    <textarea style="width:100%; height:18rem;" th:id="'template['+${iterStat.index}+'].text'" th:name="'pref.template['+${iterStat.index}+'].text'"
                              th:utext="${template.text}"></textarea>
                </div>

                <div th:if="${iterStat.index + 1 < templates.size()}" th:with="template=${templates[iterStat.index + 1]}">
                    <input type="hidden" th:name="|pref.template[${iterStat.index}].order|" th:value="${template.order}">
                    <div class="grid-row">
                        <div class="verysmall align-center">
                            <th:block
                                    th:insert="~{fragments/elements/select::selectCheckBox('pref.template['+${iterStat.index}+'].selected',#{localmember.pref.template.selected},${template.selected},'0')}"
                                    th:with="extraClass='verysmall align-center'"></th:block>
                        </div>
                        <th:block
                                th:insert="~{fragments/elements/input::inputHtmlLift('pref.template['+${iterStat.index}+'].title','localmember.pref.template.title','template.title','0')}"></th:block>
                    </div>

                    <textarea style="width:100%; height:18rem;" th:id="'template['+${iterStat.index}+'].text'" th:name="'pref.template['+${iterStat.index}+'].text'"
                              th:utext="${template.text}"></textarea>

                </div>
            </div>
        </div>
    </fieldset>


    <!--    <fieldset class="grid">-->
    <!--        <div th:text="#{localmember.pref.room}"></div>-->
    <!--        <th:block th:insert="~{fragments/elements/dropdown::dbDropdown('pref.room1','',${rooms}, 'pref.room1',true,'0')}"></th:block>-->
    <!--        <th:block th:insert="~{fragments/elements/dropdown::dbDropdown('pref.room2','',${rooms}, 'pref.room2',true,'0')}"></th:block>-->
    <!--        <th:block th:insert="~{fragments/elements/dropdown::dbDropdown('pref.room3','',${rooms}, 'pref.room3',true,'0')}"></th:block>-->
    <!--        <th:block th:insert="~{fragments/elements/dropdown::dbDropdown('pref.room4','',${rooms}, 'pref.room4',true,'0')}"></th:block>-->
    <!--    </fieldset>-->
    <fieldset>
        <div th:text="#{localmember.pref.template.openingshours}"></div>
        <textarea style="width:100%; height:14rem;" id="openingsTimes" name="pref.openingsTimes" th:utext="${pref.openingsTimes}"></textarea>
    </fieldset>
</div>
