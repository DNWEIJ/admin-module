<fieldset>
    <div class="grid">
        <input id="id" name="id" th:value="${localmember.id}" type="hidden">
        <input id="version" name="version" th:value="${localmember.version}" type="hidden">

        <th:block th:insert="~{fragments/elements/input::inputHtmlLift('localMemberName','localmember.name','localmember.localMemberName','0')}"></th:block>
    </div>
    <div class="grid">
        <th:block th:insert="~{fragments/elements/input::inputHtmlLift('email','localmember.email','localmember.email','0')}" th:with="type='email',required=false"></th:block>
        <th:block th:insert="~{fragments/elements/input::inputHtmlLift('phone1','localmember.phone1','localmember.phone1','0')}" th:with="required=false"></th:block>
        <th:block th:insert="~{fragments/elements/input::inputHtmlLift('phone2','localmember.phone2','localmember.phone2','0')}" th:with="required=false"></th:block>
    </div>
</fieldset>
<fieldset>
    <div class="grid">
        <th:block th:insert="~{fragments/elements/input::inputHtmlLift('streetAndNr','localmember.address1','localmember.streetAndNr','0')}" th:with="required=false"></th:block>
    </div>
    <div class="grid">
        <th:block th:insert="~{fragments/elements/input::inputHtmlLift('city','localmember.city','localmember.city','0')}" th:with="required=false"></th:block>
        <th:block th:insert="~{fragments/elements/input::inputHtmlLift('zipCode','localmember.zipCode','localmember.zipCode','0')}" th:with="required=false"></th:block>
    </div>
</fieldset>

<fieldset>
    <legend th:utext="#{localmember.add.tax}"></legend>
    <div class="grid-row">
        <th:block th:insert="~{fragments/elements/input::inputHtmlLift('taxLow','localmember.taxLow','','0')}" th:with="required=false,type='number'"></th:block>
        <th:block th:insert="~{fragments/elements/input::inputHtmlLift('taxHigh','localmember.taxHigh','','0')}" th:with="required=false,type='number'"></th:block>
    </div>
    <button id="btn" style="width: 100%;"
            th:value="#{label.button.createnew}"
            role="button"
            th:hx-post="'/admin/localmember/'+${localmember.id}+'/tax'"
            hx-target="#TaxTable"
            hx-swap="outerHTML"
            hx-include="#taxLow, #taxHigh"
            onclick="return validate()">
        <span th:utext="#{label.button.createnew}"></span>
    </button>
    <script>
        function validate() {
            if (document.getElementById('taxLow').value != '' &&
                document.getElementById('taxHigh').value != '') {
                return true;
            } else {
                alert('all fields should be filled');
                return false;
            }
        }

        function clear() {
            document.getElementById('taxLow').value = '';
            document.getElementById('taxHigh').value = '';
        }
    </script>
</fieldset>
<th:block th:insert="~{/admin-module/localmember/snippets/taxtable}"></th:block>
