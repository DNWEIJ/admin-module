<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{/layout.html}">
<head>
    <script type="importmap">
        {
            "imports": {
                "ckeditor5": "https://cdn.ckeditor.com/ckeditor5/43.3.1/ckeditor5.js",
                "ckeditor5/": "https://cdn.ckeditor.com/ckeditor5/43.3.1/"
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdn.ckeditor.com/ckeditor5/43.3.1/ckeditor5.css">
    <script type="module" th:src="@{/lib/js/standard_ckeditor.js}"></script>
    <style>
        .ck-editor__editable {
             height: calc(100vh - 40rem); /*  200px header + 60px footer */

        }
    </style>
    <title>Manual page</title>
</head>
<body>
<section layout:fragment="content">

    <th:block th:insert="~{fragments/elements/pagetitle::pageTitle(${manual.id}, #{label.manual.title},'/admin/manuals')}"></th:block>

    <form th:action="@{/admin/manual}" method="post" onsubmit="document.getElementById('contentToSave').value = window.editor.getData();">
        <th:block th:insert="~{fragments/elements/buttons::saveButtons}"></th:block>
        <fieldset class="grid">
            <input type="hidden" id="id" name="id" th:value="${manual.id}"/>
            <input type="hidden" id="version" name="version" th:value="${manual.version}"/>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" id="contentToSave" name="htmlDescription"/>

            <th:block th:insert="~{fragments/elements/input::inputHtmlLift('name','label.manual.name', 'manual.name','0')}"></th:block>
        </fieldset>
    </form>
    <div id="editor" th:utext="${manual.htmlDescription}"></div>
    <th:block th:insert="~{fragments/elements/audit::audit('manual.addedBy','manual.addedOn', 'manual.lastEditedBy', 'manual.lastEditedOn')}"></th:block>
</section>
</body>
</html>
