<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{/layout.html}">
<head>
    <title>Rol lijst</title>
</head>
<body>
<section layout:fragment="content">

    <th:block th:insert="~{fragments/elements/pagetitle::pageTitleList('Role','/admin/role')}"></th:block>
    <table id="show-table" data-no-export>
        <thead>
        <tr>
            <th>[[#{role.name}]]</th>
        </tr>
        </thead>
        <tbody>
        <th:block th:each="role : ${roles}">
            <tr>
                <td><a th:href="@{'/admin/role/'+ ${role.id}}">[[${role.name}]]</a></td>
            </tr>
        </th:block>
        </tbody>
        <tfoot>
        <tr>
            <td></td>
        </tr>
        </tfoot>
    </table>
</section>
