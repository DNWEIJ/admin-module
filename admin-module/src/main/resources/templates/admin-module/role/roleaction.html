<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{/layout.html}">
<head>
    <title>Role settings</title>
</head>
<body>
<section layout:fragment="content">
    <th:block th:insert="~{fragments/elements/pagetitle::pageTitle(${role.id}, 'Role','/admin/roles')}"></th:block>

    <form th:action="@{/admin/role}" method="post" name="form">

        <th:block th:insert="~{fragments/elements/buttons::saveButtons}"></th:block>

        <fieldset class="grid" role="presentation">
            <input id="id" name="id" th:value="${role.id}" type="hidden"/>
            <input id="version" name="version" th:value="${role.version}" type="hidden"/>

            <th:block th:insert="~{fragments/elements/input::inputHtmlLift('name','role.name', 'role.name', '1')}"></th:block>
        </fieldset>
        </form>
</section>
