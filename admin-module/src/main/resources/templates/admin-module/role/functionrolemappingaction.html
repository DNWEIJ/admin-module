<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{/layout.html}">
<head>
    <title>Role settings</title>
</head>
<body>
<section layout:fragment="content">
    <th:block th:insert="~{fragments/elements/pagetitle::pageTitle('role.id', 'Role','/admin/roles')}"></th:block>

    <form method="post" th:action="@{/admin/roles/savematrix}">
        <table>
            <thead>
            <tr>
                <th>function type</th>
                <th>Function name</th>

                <th th:each="role : ${roles}"
                    th:text="${role.name}">
                </th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="row : ${matrix}">
                <td th:text="${row.functionType}"></td>
                <td th:text="${row.functionName}"></td>
                <!-- One cell per role -->
                <td th:each="role : ${roles}">
<!--                    <input type="hidden" th:name="'permissions[' + ${row.functionId} + '][' + ${role.id} + ']'" value="false"/>-->
                    <input type="checkbox" th:name="'permissions[' + ${row.functionId} + '][' + ${role.id} + ']'"  value="true" th:checked="${row.rolePermissions[role.id]}"/>
                </td>

<!--                <td  th:each="role, roleStat : ${roles}" th:with="idx=${rowStat.index * roles.size() + roleStat.index}" >-->
<!--                    <input type="hidden"   th:name="'permissions[' + ${idx} + '].functionId'" th:value="${row.functionId}"/>-->
<!--                    <input type="hidden"   th:name="'permissions[' + ${idx} + '].roleId'" th:value="${role.id}"/>-->
<!--                    <input type="checkbox" th:name="'permissions[' + ${idx} + '].enabled'" th:checked="${row.rolePermissions[role.id]}"/>-->
<!--                </td>-->
            </tr>
            </tbody>
        </table>
        <br>
        <button name="submitButton" value="_save" type="submit">Save permissions</button>
    </form>
</section>
