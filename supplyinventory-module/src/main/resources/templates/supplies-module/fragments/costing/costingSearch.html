<th:block th:fragment="costingSearch">
    <script th:inline="javascript">
        const messageNoCostingSelected = /*[[#{label.costing.search.nocostingselected}]]*/ "";
        const isPriceInfo = /*[[${salesType.isPriceInfo}]]*/ false;
        const isEstimate = /*[[${salesType.isEstimate}]]*/ false;
        const isVisit = /*[[${salesType.isVisit}]]*/ false;
        const isProductProduct = /*[[${salesType.isCostingProduct}]]*/ false;
        const isOtc = /*[[${salesType.isOtc}]]*/ false;
        // set the checkbox and load the list
        document.addEventListener("DOMContentLoaded", () => {
            if ([[${productSearchForm.useDropDown}]]) {
                const cb = document.getElementById("useDropDown");
                cb.checked = true;
                cb.dispatchEvent(new Event("click", { bubbles: true }));
            }
        });
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.querySelector("#productSearchForm");
            if (form == null) return
            form.setAttribute("hx-post", form.getAttribute("hx-post") + "/lineitem");
            htmx.process(form);

        });

        let selectedIndex = -1
        let selectedFieldDataSet

        // used in checkbox -> hx-on::after-request="setView(this)"/>
        function setView(checkbox) {
            document.getElementById("holder-input").classList.toggle("hidden", checkbox.checked);
            document.getElementById("holder-dropdown").classList.toggle("hidden", !checkbox.checked);
        }

        function updateToSelectedElement(listItems) {
            if (listItems.length === 0) return
            listItems.forEach((li, index) => {
                li.classList.toggle("selected", index === selectedIndex)
                if (index === selectedIndex) {
                    li.scrollIntoView({block: "nearest"})
                }
            })
        }

        function getAllItems() {
            return document.querySelectorAll("#input-productName li")
        }

        function executeAction(action) {
            if (action === "find") {
                if (!document.getElementById("holder-dropdown").classList.contains("hidden")) {
                    const select = document.getElementById("productsFromCategory");
                    const selectedOption = select.options[select.selectedIndex];
                    selectedFieldDataSet = selectedOption.dataset
                } else {
                    selectedField = Array.from(getAllItems()).filter(li => li.classList.contains("selected"))[0]
                    if (selectedField === undefined) {
                        alert(messageNoProductSelected)
                        return
                    } else {
                        selectedFieldDataSet = selectedField.dataset
                    }
                }
                if (isVisit || isOtc) {
                    // we're already setting the url, since we will lose the selected field test on hx-get being set instead
                    let productBatchUrlGet = document.getElementById("batchNumberForProduct")
                    productBatchUrlGet.setAttribute("hx-get", '/product/product/' + selectedFieldDataSet.id + '/batchnumbers')
                }
                // clean up
                document.getElementById("productFind").value = selectedFieldDataSet.nomenclature
                document.getElementById("input-productName").innerHTML = ""
                document.getElementById("inputProductId").value = selectedFieldDataSet.id

                if (!isProductProduct) {
                    let element = document.getElementById("inputProductQuantity")
                    element.focus()
                    element.select()
                } else {
                    htmx.trigger("#productSearchForm", "submit")
                    resetForNextItem()
                }
            }

            if (action === "productAmount") {
                if ((isVisit || isOtc) && selectedFieldDataSet !== undefined && selectedFieldDataSet.hasBatch === 'true') {
                    let element = document.getElementById("batchNumberForProduct")
                    let inputElement = document.getElementById("inputBatchNumber")
                    htmx.process(element)
                    htmx.trigger("#batchNumberForProduct", "batchRequired")

                    inputElement.removeAttribute("disabled")
                    inputElement.focus()
                    inputElement.select()
                } else {
                    // finished, post the result to the target
                    htmx.trigger("#productSearchForm", "submit")
                    resetForNextItem()
                }
            }
            if (action === "batch") {
                if (!isPriceInfo && !isEstimate && (selectedFieldDataSet !== undefined && selectedFieldDataSet.hasSpillage === 'true')) {
                    let element = document.getElementById("spillageForProduct")
                    let inputElement = document.getElementById("inputSpillage")
                    htmx.process(element)
                    htmx.trigger("#spillageForProduct", "spillageRequired")
                    inputElement.removeAttribute("disabled")
                    inputElement.focus()
                    inputElement.select()
                } else {
                    // finished, post the result to the target
                    htmx.trigger("#productSearchForm", "submit")
                    resetForNextItem()
                }
            }
            if (action === "spillage") {
                // finished, post the result to the target
                htmx.trigger("#productSearchForm", "submit")
                resetForNextItem()
            }
        }

        function resetForNextItem() {
            // global values
            selectedIndex = -1
            selectedFieldDataSet = undefined

            if (isVisit || isOtc) {
                var element = document.getElementById("inputBatchNumber")
                element.value = ''
                element.setAttribute("disabled", true)

                element = document.getElementById("inputSpillage")
                element.value = ''
                element.setAttribute("disabled", true)
            }
            if (!isProductProduct) {
                document.getElementById("inputProductQuantity").value = '1.0'
            }

            if (document.getElementById("holder-dropdown").classList.contains("hidden")) {
                 element = document.getElementById("productFind")
                element.value = ''
                element.focus()
                element.select()
            } else {
                document.getElementById("productsFromCategory").innerHTML = ""
                document.getElementById("categoryList").focus()
                document.getElementById("categoryList").select()
            }
        }

        function attachMouseHandlersToAllItems() {
            const listItems = getAllItems()

            listItems.forEach((li, index) => {
                li.addEventListener("mouseenter", () => {
                    // highlight hovered item
                    selectedIndex = index
                    updateToSelectedElement(listItems)
                })

                li.addEventListener("click", (event) => {
                    executeAction("find")
                    event.preventDefault()
                })
            })
        }

        document.addEventListener("DOMContentLoaded", () => {

            attachMouseHandlersToAllItems()
            selectedIndex = -1

            document.getElementById("productFind").addEventListener("keydown", (event) => {
                const listItems = getAllItems()
                if (listItems.length === 0) {
                    if (event.key === "Enter" || event.key === "Tab") {
                        event.preventDefault()
                        return
                    }
                }
                switch (event.key) {
                    case "ArrowDown":
                        if (selectedIndex < listItems.length - 1) {
                            selectedIndex++
                            updateToSelectedElement(listItems)
                        } else if (selectedIndex === -1 && listItems.length > 0) {
                            selectedIndex = 0
                            updateToSelectedElement()
                        }
                        event.preventDefault()
                        break
                    case "ArrowUp":
                        if (selectedIndex > 0) {
                            selectedIndex--
                            updateToSelectedElement(listItems)
                        }
                        event.preventDefault()
                        break
                    case "Enter":
                    case "Tab":
                        executeAction("find")
                        event.preventDefault()
                        break
                }
            })

            if (!isProductProduct) {
                document.getElementById("inputProductQuantity").addEventListener("keydown", (event) => {
                    switch (event.key) {
                        case "Enter":
                        case "Tab":
                            executeAction("productAmount")
                            event.preventDefault()
                            break
                    }
                })
            }
            if (isVisit || isOtc) {
                document.getElementById("inputBatchNumber").addEventListener("keydown", (event) => {
                    switch (event.key) {
                        case "Enter":
                        case "Tab":
                            // we need to have a value
                            if (event.currentTarget.value.trim() === "") {
                                alert("add a batch number")
                                break
                            }
                            executeAction("batch")
                            event.preventDefault()
                            break
                    }
                })

                document.getElementById("inputSpillage").addEventListener("keydown", (event) => {
                    switch (event.key) {
                        case "Enter":
                        case "Tab":
                            // we need to have a value
                            if (event.currentTarget.value.trim() === "") {
                                alert("add a spillage identifier on this product")
                                break
                            }
                            executeAction("spillage")
                            event.preventDefault()
                            break
                    }
                })
            }
            if (!isProductProduct) {
                document.getElementById("productsFromCategory").addEventListener("change", function (event) {
                    executeAction("find")
                    event.preventDefault()
                });
            }
        })
    </script>
    <style>
        /*checkbox in the middle*/
        .gridSearchProductWithCheck > div:first-child {
            align-self: center; /* vertical */
            justify-self: center; /* horizontal */
        }
    </style>
    <form id="productSearchForm" th:hx-post="${productSearchUrl}" hx-target="#lineItemsTable" hx-swap="outerHTML">
        <div>
            <div class="gridSearchProductWithCheck">
                <div class="checkbox-group">
                    <label for="useDropDown" th:data-tooltip="#{label.tooltip.costing.usedropdown}" data-placement="right">
                        <input id="useDropDown" role="switch" tabindex="0" type="checkbox" autocomplete="off"
                               hx-get="/product/product/searching/category/dropdown"
                               hx-trigger="click"
                               hx-target="#categoryList"
                               hx-swap="innerHTML"
                               hx-indicator="#searching-indicator"
                               hx-on::after-request="setView(this)">
                        <span class="no-break"></span>
                    </label>
                </div>
                <div id="holder-input" class="holder">
                    <input list="input-productName" id="productFind" class="no-break" type="search" name="searchCriteria"
                           th:placeholder="#{label.costing.search.placeholder}"
                           th:data-alternatetext="#{label.costing.search.explenation}"
                           hx-post="/product/searching/product"
                           hx-trigger="input[this.value.length >=2] changed delay:500ms, keyup[key=='Enter']"
                           hx-target="#input-productName"
                           hx-swap="innerHTML"
                           hx-indicator="#searching-indicator"
                           autocomplete="off"
                    >
                    <span id="searching-indicator" class="htmx-indicator"><span aria-busy="true">Searching...</span></span>
                    <div class="ac_results_wrapper">
                        <div class="ac_results" id="input-productName" hx-on::after-swap="attachMouseHandlersToAllItems()"></div>
                    </div>
                </div>
                <div id="holder-dropdown" class="hidden">
                    <!-- options will be filled by hx-target -->
                    <div class="grid">
                        <th:block th:if="${salesType.isCostingProduct}">
                            <div>
                                <select name="categoryId" id="categoryList"
                                        hx-post="/product/search/product/lineitem"
                                        hx-target="#lineItemsTable"
                                        hx-indicator="#searching-indicator2"
                                        hx-swap="outerHTML">
                                </select>
                            </div>
                        </th:block>
                        <th:block th:unless="${salesType.isCostingProduct}">
                            <div>
                                <select name="categoryId" id="categoryList"  th:value="${productSearchForm.categoryId}"
                                        hx-post="/product/product/searching/product/dropdown/found/product"
                                        hx-target="#productsFromCategory"
                                        hx-indicator="#searching-indicator2"
                                        hx-swap="innerHTML">
                                </select>
                            </div>
                            <div>
                                <select tabindex="1" id="productsFromCategory">
                                    <option disabled readonly selected="true" value="" th:text="#{label.choose}"></option>
                                </select>
                            </div>
                        </th:block>
                    </div>
                </div>
                <div>
                    <input type="hidden" name="inputProductId" id="inputProductId"/>
                    <th:block th:if="${!salesType.isCostingProduct}">
                        <input id="inputProductQuantity" tabindex="2" name="inputProductQuantity" size="2" type="number" value="1.0" autocomplete="off">
                    </th:block>
                </div>
                <th:block th:if="${salesType.isVisit or salesType.isOtc}">
                    <div id="productBatchNumberContainer">
                        <input th:placeholder="batchNumber" list="batchNumberForProduct" id="inputBatchNumber" tabindex="3" size="15" name="inputBatchNumber" type="text" disabled="true"/>
                        <datalist id="batchNumberForProduct"
                                  hx-get="writtenByJavascript"
                                  hx-swap="innerHTML"
                                  hx-target="#batchNumberForProduct"
                                  hx-trigger="batchRequired"
                                  hx-include="#inputBatchNumber">
                        </datalist>
                    </div>
                    <div id="productSpillageContainer">
                        <input placeholder="spillage" list="spillageForProduct" id="inputSpillage" tabindex="4" name="inputSpillage" size="15" type="text" disabled="true"/>
                        <datalist id="spillageForProduct"
                                  hx-get="writtenByJavascript"
                                  hx-swap="innerHTML"
                                  hx-target="#spillageForProduct"
                                  hx-trigger="spillageRequired"
                                  hx-include="#inputSpillage">
                        </datalist>
                    </div>
                </th:block>
            </div>
        </div>
    </form>
    <script>
        document.getElementById('productFind').addEventListener('htmx:configRequest', function (evt) {
            document.querySelector('#searching-indicator').classList.add('visible');
        });

        document.getElementById('productFind').addEventListener('htmx:afterRequest', function (evt) {
            document.querySelector('#searching-indicator').classList.remove('visible');
        });

        function alternateTextPlaceHolder() {
            const input = document.getElementById('productFind');
            let count = 0;
            const timer = setInterval(() => {
                if (++count > 3) return clearInterval(timer);
                input.style.opacity = 0;
                setTimeout(() => {
                    [input.placeholder, input.dataset.alternatetext] =
                        [input.dataset.alternatetext, input.placeholder];
                    input.style.opacity = 1;
                }, 200);
            }, 5000);
        }

        alternateTextPlaceHolder();
    </script>
</th:block>
