<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{/layout.html}">
<head>
    <title>[[#{supplies.supplies}]]</title>
</head>
<body>
<section layout:fragment="content">
    <th:block th:insert="~{fragments/elements/pagetitle::pageTitleList(#{supplies.supplies},'/supplies/distributor/supply')}"></th:block>
    <form name="distributorId" id="distributorId" hx-post="/supplies/distributor/supplies" hx-trigger="change from:#distributorName"
          hx-target="#lineItemsTable" hx-indicator="#searching-indicator2" hx-swap="outerHTML">
        <fieldset class="grid">
            <div>
                <th:block th:insert="~{fragments/elements/dropdown::dbDropdown('distributorName','','distributorId',${distributorList},true,'0')}"></th:block>
            </div>
        </fieldset>
    </form>
    <table id="suppliesTable" class="table-tight table-striped">
        <thead>
        <tr>
            <th class="no-sorting"></th>
            <th data-order="2" th:text="#{label.supplies.nomenclature}"></th>
            <th data-order="3" th:text="#{label.supplies.quantityPerPackage}"></th>
            <th data-order="4" th:text="#{label.supplies.minQuantity}"></th>
            <th data-order="5" th:text="#{label.supplies.buyQuantity}"></th>
            <th data-order="6" th:text="#{label.supplies.price}"></th>
            <th data-order="7" th:text="#{label.supplies.itemNumber}"></th>
            <th data-order="8" th:text="#{label.supplies.barcode}"></th>

        </tr>
        </thead>
        <th:block th:insert="~{supplies-module/distributor/supplies/htmx/suppliesbody}"></th:block>
    </table>
    <script>
        document.body.addEventListener('htmx:afterSwap', function (event) {
            window.updateTableFooterCount(document.getElementById("suppliesTable"))
            highlightRowOnTable()
        });
    </script>
</section>
