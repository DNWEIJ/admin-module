<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{/layout.html}">
<head>
    <title th:text="#{category.category}"></title>
</head>
<body>
<section layout:fragment="content">

<th:block th:insert="~{fragments/elements/pagetitle::pageTitle(${id}, 'Category','/product/categories')}"></th:block>

<form th:action="@{/product/category}" method="post">

    <th:block th:insert="~{fragments/elements/buttons::saveButtons}"></th:block>

    <input id="id" name="id" th:value="${category.id}" type="hidden">
    <input id="version" name="version" th:value="${category.version}" type="hidden">

    <fieldset class="grid">
        <th:block th:insert="~{fragments/elements/input::inputHtmlLift('categoryName', 'category.category', 'category.categoryName','0')}"></th:block>
        <th:block th:insert="~{fragments/elements/dropdown::propDropdown('deleted','',${category.deleted},${yesNoOptions}, true, '0')}"></th:block>
    </fieldset>
</form>
</section>
