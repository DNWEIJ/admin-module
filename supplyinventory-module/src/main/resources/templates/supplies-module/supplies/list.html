<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{/layout.html}">
<head>
    <title>Supplies lijst</title>
</head>
<body>
<section layout:fragment="content">
    <th:block th:insert="~{fragments/elements/pagetitle::pageTitleList('Supply','/supplies/supplies')}"></th:block>

    <style>
        .colgroup {
            width: 100%

        }
    </style>

    <table id="show-table" data-no-export>
        <thead>
        <tr>
            <th>Nomenclature</th>
        </tr>
        </thead>
        <tbody>
        <th:block th:each="supply : ${supplies}">
            <tr>
                <td><a th:href="@{'supplies/supplies/'+ ${supply.id}}">[[${supply.nomenclature}]]</a></td>
            </tr>
        </th:block>
        </tbody>
        <tfoot>
        <tr>
            <td></td>
        </tr>
        </tfoot>
    </table>
</section>
