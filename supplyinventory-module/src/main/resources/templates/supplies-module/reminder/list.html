<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{/layout.html}">
<head>
    <title>[[#{label.title.reminder}]]</title>
</head>
<body>
<section layout:fragment="content">
    <div th:replace="~{customer-module/fragments/customer/links}"></div>
    <th:block th:insert="~{fragments/elements/pagetitle::pageTitleListThree(#{label.title.reminder},'/supplies/customer/'+ ${customerId} + '/reminder', ${customerInformation})}"></th:block>

    <hr/>
    <table class="table-tight striped" id="show-table" data-no-export>
        <thead>
        <tr>
        <tr>
            <th>[[#{label.reminder.petname}]]</th>
            <th>[[#{label.reminder.duedate}]]</th>
            <th>[[#{label.reminder.reminder}]]</th>
            <th>[[#{label.reminder.notified}]]</th>
            <th class="desktop-only">[[#{label.list.auditinfo}]]</th>
        </tr>
        </thead>
        <tbody>
        <th:block th:each="reminder : ${reminders}">
            <tr>
                <td><a th:href="'/supplies/customer/'+ ${customerId}+ '/reminder/'+ ${reminder.id}" th:utext="${reminder.pet.nameWithDeceased}"></a></td>
                <td th:attr="data-sort-value=${reminder.dueDate}" th:text="${#temporals.format(reminder.dueDate, 'dd-MM-yyyy')}"></td>
                <td>[[${reminder.reminderText}]]</td>
                <td>[[@{__${reminder.hasBeenNotified}__}]]</td>
                <th:block
                        th:insert="~{fragments/elements/audit::lastEditedByOn_td(${reminder.addedBy},${reminder.addedOn},${reminder.lastEditedBy},${reminder.lastEditedOn})}"></th:block>
            </tr>
        </th:block>
        </tbody>
        <tfoot>
        <tr>
            <td></td>
        </tr>
        </tfoot>
    </table>
</section>
