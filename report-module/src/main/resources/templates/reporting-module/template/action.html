<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{/layout.html}">
<head>
    <script type="importmap">
        {
            "imports": {
                "ckeditor5": "https://cdn.ckeditor.com/ckeditor5/43.3.1/ckeditor5.js",
                "ckeditor5/": "https://cdn.ckeditor.com/ckeditor5/43.3.1/"
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdn.ckeditor.com/ckeditor5/43.3.1/ckeditor5.css">
    <script type="module" th:src="@{/lib/js/report/ckeditor.js}"></script>

    <style>
        .ck-editor__editable {
            /* height: calc(100vh - 200px - 60px);   200px header + 60px footer */
            height: 100%;
        }
        .placeholder-token {
            background: #eef;
            border: 1px solid #99c;
            border-radius: 4px;
            padding: 2px 6px;
            margin: 0 2px;
            white-space: nowrap;
        }
    </style>
    <title>Template</title>
</head>

<section layout:fragment="content">

    <th:block th:insert="~{fragments/elements/pagetitle::pageTitle(${template.id}, 'Template','/report/templates')}"></th:block>

    <form th:action="@{/report/template}" method="post" onsubmit="document.getElementById('contentToSave').value = window.editor.getData();">
        <th:block th:insert="~{fragments/elements/buttons::saveButtons}"></th:block>
        <fieldset class="grid">
            <input type="hidden" id="id" name="id" th:value="${template.id}"/>
            <input type="hidden" id="version" name="version" th:value="${template.version}"/>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" id="contentToSave" name="content"/>

            <th:block th:insert="~{fragments/elements/dropdown::propDropdown('reportType','label.template.reporttype', ${template.reportType}, ${templateType}, true,'0')}"></th:block>
            <th:block th:insert="~{fragments/elements/input::inputHtmlLift('purpose','label.template.purpose', 'template.purpose','0')}"></th:block>
            <th:block th:insert="~{fragments/elements/input::inputHtmlLift('subject','label.template.subject', 'template.subject','0')}"></th:block>
        </fieldset>
    </form>
    <div id="editor" th:utext="${template.content}"></div>
    <th:block th:insert="~{fragments/elements/audit::audit('template.addedBy','template.addedOn', 'template.lastEditedBy', 'template.lastEditedOn')}"></th:block>
</section>
