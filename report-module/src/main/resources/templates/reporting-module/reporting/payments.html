    <html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{/layout.html}">
<head>
    <title>[[#{label.title.appoinmentlist}]]</title>
</head>
<body>
<section layout:fragment="content">
    <form action="" method="get">
        <fieldset class="grid">
            <label th:for="visitDateTimeStart">[[#{visit.headerlist.from}]]
                <input id="visitDateTimeStart" name="from" required autofocus type="date" autocomplete="off" max="9999-01-01"
                       th:value="${#temporals.format(form.from, 'yyyy-MM-dd')}">
            </label>
            <label th:for="visitDateTimeEnd">[[#{visit.headerlist.untill}]]
                <input id="visitDateTimeEnd" name="includeTill" required type="date" autocomplete="off"
                       max="9999-01-01"
                       th:value="${#temporals.format(form.includeTill, 'yyyy-MM-dd')}">
            </label>
            <th:block
                    th:insert="~{fragments/elements/dropdown::dbDropdown('localMemberId','userpreferences.clinic', ${form.localMemberId}, ${localMembersList}, true,'0')}"
                    th:with="isSelectAll=true"></th:block>
            <th:block
                    th:insert="~{fragments/elements/dropdown::propDropdown('paymentListType','visit.headerlist.send', ${form.paymentListType}, ${paymentListType}, true,'0')}"
                    th:with="required=false"></th:block>
        </fieldset>
        <input type="submit" th:value="#{label.button.search}"/>
    </form>

    <div class="table-wrapper">
        <table id="paymentList" class="table-tight">
            <thead>
            <tr>
                <th class="asc" th:text="#{label.payment.paymentDate}"></th>
                <th class="text-align-right" th:text="#{label.payment.amount}"></th>
                <th th:text="#{label.payment.method}"></th>
                <th th:text="#{label.payment.referenceNumber}"></th>
                <th th:text="#{label.payment.visits}"></th>
                <th th:text="#{label.payment.customername}"></th>
                <th th:text="#{label.payment.balance}"></th>
                <th class="desktop-only" th:text="#{label.payment.location}"></th>
                <th class="desktop-only" th:text="#{label.payment.lasteditedby}"></th>
            </tr>
            </thead>
            <tbody>
            <th:block th:if="${#lists.size(payments) == 0}">
                <tr>
                <td colspan="3" class="center">
                    <th:block th:text="#{label.not-found}"></th:block>
                </td>
                </tr>
            </th:block>
            <th:block th:each="payment : ${payments}">
                <tr>
                    <td th:attr="data-sort-value=${payment.paymentDate}">
                        <a th:href="'/sales/customer/'+ ${customerId}+ '/payment/'+ ${payment.id}">[[${#temporals.format(payment.paymentDate, 'dd-MM-yyyy')}]]</a>
                    </td>
                    <th:block th:insert="~{fragments/elements/numberdisplay::showNumber_td(${payment.amount}, false)}"></th:block>
                    <td th:text="#{${payment.method.getLabel}}"></td>
                    <td th:text="${payment.referenceNumber}"></td>
                    <td>
                        <th:block th:each="paymentvisit : ${payment.getPaymentVisits()}">
                            <a th:if="${paymentvisit.visit.appointment.isOTC}"
                               th:href="'/sales/otc/customer/'+ ${paymentvisit.payment.customer.id} + '/visit/'+  ${paymentvisit.visit.id}"
                               th:text="${paymentvisit.visit.id}">
                            </a>
                            <a th:unless="${paymentvisit.visit.appointment.isOTC}"
                               th:href="'/consult/visit/customer/'+ ${paymentvisit.payment.customer.id} + '/visit/'+ ${paymentvisit.visit.id} + '?callFrom=customer'"
                               th:text="${paymentvisit.visit.id}">
                            </a>
                        </th:block>
                    </td>
                    <td class="desktop-only" th:text="${localMembersList.get(payment.localMemberId)}"></td>
                    <th:block
                            th:insert="~{fragments/elements/audit::lastEditedByOn_td(${payment.addedBy},${payment.addedOn},${payment.lastEditedBy},${payment.lastEditedOn})}"></th:block>
                </tr>
            </th:block>
           </tbody>
        </table>
    </div>
    <script>
        document.getElementById("invoice").addEventListener("change", function () {
            toggleTableColumns("appointmentList", [9,10], this.checked);
        });
        document.getElementById("insurance").addEventListener("change", function () {
            toggleTableColumns("appointmentList", [7,8], this.checked);
        });
        document.getElementById("vetroom").addEventListener("change", function () {
            toggleTableColumns("appointmentList", [5], this.checked);
        });
        document.getElementById("petname").addEventListener("change", function () {
            toggleTableColumns("appointmentList", [4], this.checked);
        });
    </script>
</section>
