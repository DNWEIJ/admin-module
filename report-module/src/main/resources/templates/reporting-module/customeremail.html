<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{/layout.html}">
<head>
    <title>[[#{label.title.customeremail}]]</title>
    <script src="/lib/js/report/report.js" type="text/javascript"></script>
</head>
<body>
<section layout:fragment="content">
    <form action="" method="get">
        <details id="reportCustomerEmailInfo" open>
            <summary>
                <span th:text="#{label.report.email.input.title}"></span><a href="" hx-target="#modal-container" hx-swap="innerHTML" hx-get="/info/report/customeremail" title="More info" class="emoji-icon">ℹ️</a>
            </summary>
            <div style="font-size: 1.2rem;margin:1rem" th:utext="'<b>' + #{label.mailToCustomer.stepInfoOne} + '</b>'"></div>
            <fieldset class="grid">
                <legend th:text="#{label.title.customer}"></legend>
                <div>
                    <th:block th:insert="~{fragments/elements/dropdown::dbDropdown('nrOfMonths','label.report.email.monthspre', ${docForm.nrOfMonths}, ${monthList}, true,'0')}"
                              th:with="required=false"></th:block>
                </div>

                <div>
                    <th:block
                            th:insert="~{fragments/elements/dropdown::propDropdown('customerActive','label.report.email.customeractive', ${docForm.customerActive}, ${ynvaluesList}, false,'0')}"></th:block>
                </div>
                <div>
                    <th:block
                            th:insert="~{fragments/elements/dropdown::propDropdown('emailAddress','label.report.email.emailaddress', ${docForm.emailAddress}, ${ynvaluesList}, false,'0')}"></th:block>
                </div>
                <div>
                    <th:block
                            th:insert="~{fragments/elements/dropdown::propDropdown('newsLetter','label.report.email.newsletter', ${docForm.newsLetter}, ${ynvaluesList}, false,'0')}"></th:block>
                </div>

            </fieldset>
            <fieldset class="grid">
                <legend th:text="#{label.title.pet}"></legend>
                <div><th:block th:insert="~{fragments/elements/dropdown::propDropdown('certainPetAge','label.report.email.petage', ${docForm.certainPetAge}, ${ynvaluesList}, false,'0')}"></th:block></div>
                <div><th:block th:insert="~{fragments/elements/input::inputHtmlLift('minAgePetInMonths','label.report.email.minAgePet', ${docForm.minAgePetInMonths},'3')}" th:with="type='number'"></th:block></div>
                <div><th:block th:insert="~{fragments/elements/input::inputHtmlLift('maxAgePetInMonths','label.report.email.maxAgePet', ${docForm.maxAgePetInMonths},'3')}" th:with="type='number'"></th:block></div>
                <div><th:block th:insert="~{fragments/elements/dropdown::propDropdown('onlyLivingPets','label.report.email.limitalive', ${docForm.onlyLivingPets}, ${ynvaluesList}, false,'0')}"></th:block></div>
                <div><th:block th:insert="~{fragments/elements/dropdown::propDropdown('sexType','label.report.email.sextype', ${docForm.sexType}, ${sexTypeList}, false,'0')}"></th:block></div>
                <div><th:block th:insert="~{fragments/elements/dropdown::dbDropdown('species','pet.species', ${docForm.species}, ${species}, false,'0')}"></th:block></div>
            </fieldset>
            <fieldset class="grid">
                <legend th:text="#{label.history.product}"></legend>
                <div>
                    show product list to send
                </div>
            </fieldset>
            <input type="submit" th:value="#{label.button.search}"/>
        </details>
    </form>
    <form action="/report/customerlist" method="POST">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <table data-no-export data-no-highlight>
            <tr>
                <td><button type="submit" name="actionType" value="EMAIL" th:onclick="'return validateMinimalOneSelection(\'rec-table\', \''+ #{label.error.atleastone} + '\')'"
                            th:data-tooltip="#{label.report.action.sendEmail}" class="buttonForLink">📧</button></td>
                <td><button type="submit" name="actionType" value="REPORT" th:onclick="'return validateMinimalOneSelection(\'rec-table\', \''+ #{label.error.atleastone} + '\')'"
                            th:data-tooltip="#{label.report.action.createLetter}" class="buttonForLink">🖨️</button></td>
                <td><button type="submit" name="actionType" value="APPOINTMENT" th:onclick="'return validateSingleSelection(\'rec-table\', \''+ #{label.error.singlecheckbox} + '\')'"
                            th:data-tooltip="#{label.report.action.showAppointment}" class="buttonForLink">📅</button></td>
                <td></td>
            </tr>
        </table>
        <table class="table-tight " id="rec-table">
            <thead>
            <tr>
                <th class="no-sorting">
                    <input role="switch" type="checkbox" th:checked="false" onchange="toggleAllCheckBoxesInSurroundingElement(this, 'table')">
                </th>
                <th th:text="#{report.reminders.headerlist.customerName}"></th>
                <th th:text="#{report.reminders.headerlist.email}"></th>
                <th th:text="#{report.reminders.headerlist.phone}"></th>
                <th th:text="#{report.reminders.headerlist.petName}"></th>
                <th th:text="#{pet.species}"></th>
                <th th:text="#{pet.sex}"></th>
                <th th:text="#{pet.birthday}"></th>
                <th th:utext="#{pet.deceased}"></th>
            </tr>
            </thead>
            <tbody>
            <th:block th:each="rec, iterStat : ${customers}">
                <tr class="table-primary">
                    <td><th:block th:insert="~{fragments/elements/select::switch('selectedRec', ${rec.id})}"></th:block></td>
                    <td th:text="${rec.customerName}"></td>
                    <td th:text="${rec.email}"></td>
                    <td th:text="${rec.mobilePhone + '/' + rec.workPhone}"></td>
                    <th:block th:if="${!#lists.isEmpty(rec.pets)}">
                        <td th:text="${rec.pets[0].name}"></td>
                        <td th:text="${rec.pets[0].species} + '/'+ ${rec.pets[0].breed}"></td>
                        <td th:text="#{__${rec.pets[0].sex.label}__}"></td>

                        <td th:text="${rec.pets[0].birthday}"></td>
                        <td th:text="#{__${rec.pets[0].deceased.label}__}"></td>
                    </th:block>
                    <th:block th:if="${#lists.isEmpty(rec.pets)}">
                        <td colspan="6">No pets</td>
                    </th:block>
                </tr>
                <th:block th:if="${!#lists.isEmpty(rec.pets)}">
                    <tr th:each="pet, iterStat : ${rec.pets}" th:if="${iterStat.index > 0}" class="table-light">
                        <td><input type="hidden" name="petRec" th:value="${rec.id+'_'+pet.id}"></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td th:text="${pet.name}"></td>
                        <td th:text="${pet.species} + '/'+ ${pet.breed}"></td>
                        <td th:text="#{__${pet.sex.label}__}"></td>
                        <td th:text="${pet.birthday}"></td>
                        <td th:text="#{__${pet.deceased.label}__}"></td>
                    </tr>
                </th:block>
            </th:block>
            </tbody>
            <tfoot>
            </tfoot>
        </table>
    </form>
</section>
