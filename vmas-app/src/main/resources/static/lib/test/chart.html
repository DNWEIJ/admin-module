<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Top 10 Services per Month</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; }
        canvas { max-width: 1200px; }
    </style>
</head>
<body>

<h2>Top 10 Services per Month (Dynamic)</h2>
<canvas id="chart"></canvas>

<script>
    // Months
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    // Base dataset (January = real data)
    const baseServices = {
        "Bloedafname": 12,
        "Skyla Diagnosis PLUS Panel (G)": 10,
        "urine strip": 9,
        "urine sediment": 8,
        "verzenden naar lab. + interpr.": 8,
        "Hematologie Bepaling": 8,
        "urine soortelijkgewicht": 7,
        "Urineonderzoek volledig (G)": 7,
        "Vet Med Labor bepaling per euro (G)": 7,
        "Solution Total T4": 5,
        "Skyla pLipase+Amylase": 3,
        "Solution cCRP": 2,
        "Skyla Diabetes Panel (c)": 1,
        "Skyla UPC KIT": 1,
        "Glucose controle \"strip\"": 1,
        "Sotution Serum Amyloid A (SAA)": 1,
        "Vet Med Labor Bloedafname per ? (G)": 1
    };

    // Helper: randomize counts
    function randomize(base) {
        return Math.max(0, Math.round(base * (0.5 + Math.random())));
    }

    // Generate monthly top 10
    let monthlyTop10 = [];

    // January (real top 10)
    const janTop10 = Object.entries(baseServices)
        .sort((a,b) => b[1] - a[1])
        .slice(0,10);

    monthlyTop10.push(Object.fromEntries(janTop10));

    // Other months (randomized + re-ranked)
    for (let m = 1; m < 12; m++) {
        const randomized = Object.entries(baseServices).map(([name, val]) => {
            return [name, randomize(val)];
        });

        const top10 = randomized
            .sort((a,b) => b[1] - a[1])
            .slice(0,10);

        monthlyTop10.push(Object.fromEntries(top10));
    }

    // Collect all services that appear in any top 10
    const allServices = new Set();
    monthlyTop10.forEach(month => {
        Object.keys(month).forEach(s => allServices.add(s));
    });

    // Build datasets (each service = one line)
    const datasets = Array.from(allServices).map(service => {
        return {
            label: service,
            data: monthlyTop10.map(month => month[service] ?? null),
            tension: 0.3
        };
    });

    // Create chart
    new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels: months,
            datasets: datasets
        },
        options: {
            responsive: true,
            interaction: {
                mode: "nearest",
                intersect: false
            },
            plugins: {
                legend: {
                    position: "right"
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>

</body>
</html>
