<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <script type="importmap">
        {
            "imports": {
                "ckeditor5": "https://cdn.ckeditor.com/ckeditor5/43.3.1/ckeditor5.js"
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdn.ckeditor.com/ckeditor5/43.3.1/ckeditor5.css">

    <style>
        .placeholder-token {
            background: #eef;
            border: 1px solid #99c;
            border-radius: 4px;
            padding: 2px 6px;
            margin: 0 2px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="editor"></div>
<script>let editorInstance;</script>
<script type="module">
    import {
        ClassicEditor, Plugin, Command, Widget,
        Essentials, Bold, Italic, Underline, Strikethrough, Font,
        Paragraph, Heading, List, Link, BlockQuote, Table, TableToolbar,
        Alignment, Indent, HorizontalLine, SpecialCharacters,
        SpecialCharactersEssentials, RemoveFormat, Undo, SourceEditing,
        createDropdown, addListToDropdown, Collection, toWidget
    } from 'ckeditor5';

    // ===== PLACEHOLDER CONFIGURATION =====
    const PLACEHOLDERS = [
        {
            group: 'Customer',
            items: [
                { label: 'Salutation', value: 'customer.salutation' },
                { label: 'Customer Name', value: 'customer.customerName' },
                { label: 'Address', value: 'customer.address' },
                { label: 'Email', value: 'customer.email' },
                { label: 'Phone', value: 'customer.phone' }
            ]
        },
        {
            group: 'Pet',
            items: [
                { label: 'Pet Name', value: 'pet.name' },
                { label: 'Species', value: 'pet.species' },
                { label: 'Sex', value: 'pet.sex' },
                { label: 'Age', value: 'pet.age' }
            ]
        },
        {
            group: 'Reminder',
            items: [
                { label: 'Reminder Date', value: 'reminder.date' },
                { label: 'Reminder Text', value: 'reminder.reminderText' }
            ]
        }
    ];

    // ===== PLACEHOLDER COMMAND =====
    class PlaceholderCommand extends Command {
        execute({ value, label }) {
            const editor = this.editor;

            editor.model.change(writer => {
                const element = writer.createElement('placeholder', { value, label });
                editor.model.insertContent(element);
            });
        }
    }

    // ===== PLACEHOLDER PLUGIN =====
    class PlaceholderPlugin extends Plugin {
        static get requires() {
            return [Widget];
        }

        init() {
            const editor = this.editor;

            // Schema - defines the placeholder element
            editor.model.schema.register('placeholder', {
                allowWhere: '$text',
                isInline: true,
                isObject: true,
                allowAttributes: ['value', 'label']
            });

            // Downcast - how it appears in the editor (visual)
            editor.conversion.for('downcast').elementToElement({
                model: 'placeholder',
                view: (modelItem, { writer }) => {
                    const span = writer.createContainerElement('span', {
                        class: 'placeholder-token',
                        'data-placeholder': modelItem.getAttribute('value')
                    });

                    writer.insert(
                        writer.createPositionAt(span, 0),
                        writer.createText(modelItem.getAttribute('label'))
                    );

                    return toWidget(span, writer);
                }
            });

            // Data downcast - what gets saved (Mustache format)
            editor.conversion.for('dataDowncast').elementToElement({
                model: 'placeholder',
                view: (modelItem, { writer }) => {
                    const value = modelItem.getAttribute('value');
                    // Output clean Mustache syntax
                    return writer.createText(`{{${value}}}`);
                }
            });

            // Upcast - reading placeholders from HTML
            editor.conversion.for('upcast').elementToElement({
                view: {
                    name: 'span',
                    attributes: {
                        'data-placeholder': true
                    }
                },
                model: (viewElement, { writer }) => {
                    return writer.createElement('placeholder', {
                        value: viewElement.getAttribute('data-placeholder'),
                        label: viewElement.getChild(0)?.data || ''
                    });
                }
            });

            // Register command
            editor.commands.add('insertPlaceholder', new PlaceholderCommand(editor));

            // UI - toolbar dropdown
            editor.ui.componentFactory.add('placeholders', locale => {
                const dropdown = createDropdown(locale);

                dropdown.buttonView.set({
                    label: '{{...}}',
                    withText: true,
                    tooltip: 'Insert placeholder'
                });

                const items = new Collection();

                PLACEHOLDERS.forEach(group => {
                    group.items.forEach(item => {
                        items.add({
                            type: 'button',
                            model: {
                                label: `${group.group}: ${item.label}`,
                                withText: true,
                                value: item.value,
                                itemLabel: item.label
                            }
                        });
                    });
                });

                addListToDropdown(dropdown, items);

                dropdown.on('execute', evt => {
                    editor.execute('insertPlaceholder', {
                        value: evt.source.model.value,
                        label: evt.source.model.itemLabel
                    });
                });

                return dropdown;
            });
        }
    }

    // ===== EDITOR INITIALIZATION =====
    function initWhenReady() {
        const editorElement = document.querySelector('#editor');
        if (!editorElement) {
            setTimeout(initWhenReady, 50);
            return;
        }

        ClassicEditor.create(editorElement, {
            plugins: [
                Essentials, Bold, Italic, Underline, Strikethrough, Font,
                Paragraph, Heading, List, Link, BlockQuote, Table, TableToolbar,
                Alignment, Indent, HorizontalLine, SpecialCharacters,
                SpecialCharactersEssentials, RemoveFormat, Undo, SourceEditing,
                PlaceholderPlugin  // Add placeholder plugin
            ],
            toolbar: [
                'placeholders', '|',  // Placeholder dropdown first
                'heading', '|',
                'fontSize', 'fontFamily', 'fontColor', 'fontBackgroundColor', '|',
                'bold', 'italic', 'underline', 'strikethrough', '|',
                'alignment', '|',
                'numberedList', 'bulletedList', '|',
                'outdent', 'indent', '|',
                'link', 'insertTable', 'blockQuote', '|',
                'horizontalLine', 'specialCharacters', '|',
                'removeFormat', '|',
                'undo', 'redo', '|',
                'sourceEditing'
            ],
            table: {
                contentToolbar: ['tableColumn', 'tableRow', 'mergeTableCells']
            }
        })
            .then(editor => {
                window.editor = editor;
                console.log('✅ CKEditor with placeholders ready');
            })
            .catch(error => {
                console.error('CKEditor error:', error);
            });
    }

    // Start initialization when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initWhenReady);
    } else {
        initWhenReady();
    }

</script>

</body>
</html>
