<th:block th:fragment="paymentform" xmlns:th="http://www.w3.org/1999/html">

    <input id="id" name="id" th:value="${payment.id}" type="hidden"/>
    <input id="version" name="version" th:value="${payment.version}" type="hidden"/>
    <input id="localMemberId" name="localMemberId" th:value="${payment.localMemberId}" type="hidden"/>

    <th:block th:replace="~{this :: paymentVisitConnection}"></th:block>

    <fieldset>
        <legend>[[#{label.payment.details}]]</legend>
        <div class="grid">
            <th:block th:with="paymentAmount=${#numbers.formatDecimal(payment.amount, 1, 2, 'POINT')}">
                <th:block th:insert="~{fragments/elements/input::inputHtmlLift('amount','label.payment.amount','paymentAmount','2')}"
                          th:with="shouldFocus=true,pattern='^(?!0+(?:\.0+)?$)\d+(?:\.\d{1,2})?$'"></th:block>
            </th:block>
            <th:block th:insert="~{fragments/elements/input::inputHtmlLift('paymentDate','label.payment.paymentDate','payment.paymentDate','3')}"></th:block>
        </div>
        <div class="grid">
            <th:block th:insert="~{fragments/elements/dropdown::propDropdown('method','label.payment.method',${payment.method}, ${payMethodsList}, true,'1')}"></th:block>
            <th:block th:insert="~{fragments/elements/input::inputHtmlLift('referenceNumber','label.payment.referenceNumber','payment.referenceNumber','4')}"
                      th:with="required=false"></th:block>
        </div>
        <div class="grid">
            <label for="comments">
                <th:block th:utext="#{label.payment.comments}"/>
                <textarea cols="110" id="comments" name="comments" rows="8" tabindex="5" th:utext="${payment.comments}"></textarea>
            </label>
        </div>
    </fieldset>
</th:block>

<th:block th:fragment="paymentVisitConnection" xmlns:th="http://www.w3.org/1999/html">
    <fieldset id="paymentvisitTable">
        <legend th:text="#{label.payment.connecedto}"></legend>
        <span th:if="${error != null}" class="red-text" th:text="#{label.payment.errortext}"></span>
        <div class="grid" style="align-items: start; gap: 3rem;">


            <div id="connectConsultForm">
                <div th:text="#{label.payment.addconsult}"></div>
                <div class="grid">
                <th:block th:insert="~{fragments/elements/input::inputHtmlLift('newVisitId','label.title.Visit','','0')}" th:with="type='number'"></th:block>
                <button type="button" th:hx-post="'/sales/payment/'+ ${payment.id}+ '/add'" hx-include="#connectConsultForm" hx-target="#paymentvisitTable"
                        onclick="
                                const input = document.getElementById('newVisitId');
                                if (!input.value || input.value == '0') {
                                    input.setCustomValidity('#{label.required}');
                                    input.reportValidity();
                                    input.setCustomValidity('');
                                } else {
                                    htmx.trigger(this, 'confirmed');
                                }
                            ">
                    [[#{label.button.save}]]
                </button>
                </div>
            </div>
            <div>
                <div th:if="${payment.paymentVisits != null}">
                    <table class="no-sorting" style="max-width:20rem;">
                        <thead>
                        <th th:text="#{label.button.delete} + '?'"></th>
                        <th th:text="#{label.title.Visit}"></th>
                        <th th:text="#{label.title.Visit} + ' '+ #{label.payment.amount}"></th>
                        </thead>
                        <tbody>
                        <div th:each="paymentvisit : ${payment.paymentVisits}">
                            <tr>
                                <td><a href=""
                                       th:hx-delete="'/sales/payment/' + ${payment.id} + '/visit/' + ${paymentvisit.visit.Id}" hx-target="#paymentvisitTable"
                                       th:hx-confirm="#{label.otc.sell.delete.confirm}"
                                       hx-on:htmx:before-request="messageDisplay(this.dataset.savedMsg)">🗑</a></td>
                                <td th:if="${paymentvisit.visit.appointment.isOTC}">
                                    <a th:href="'/sales/otc/customer/'+ ${paymentvisit.visit.pet.customer.id} + '/visit/'+  ${paymentvisit.visit.id}"
                                       th:text="${#temporals.format(paymentvisit.visit.appointment.visitDateTime, 'dd-MM-yyyy HH:mm') + ' - '+ paymentvisit.visit.id} +' (OTC)'}"></a>
                                </td>
                                <td th:unless="${paymentvisit.visit.appointment.isOTC}">
                                    <a th:href="'/consult/visit/customer/'+ ${paymentvisit.visit.pet.customer.id} + '/visit/'+ ${paymentvisit.visit.id} + '?callFrom=customer'"
                                       th:text="${#temporals.format(paymentvisit.visit.appointment.visitDateTime, 'dd-MM-yyyy HH:mm') + ' - '+ paymentvisit.visit.id}"></a>
                                </td>
                                <th:block th:insert="~{fragments/elements/numberdisplay::showNumber_td(${paymentvisit.visit.totalAmountIncTax}, false)}"></th:block>
                            </tr>
                        </div>
                        </tbody>
                    </table>
                </div>
                <div th:unless="${payment.paymentVisits != null}">
                    <div th:text="#{label.not-found}"></div>
                </div>
            </div>
        </div>
    </fieldset>
</th:block>
