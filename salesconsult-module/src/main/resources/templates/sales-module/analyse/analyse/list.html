<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{/layout.html}">
<head>
    <title>[[#{label.title.analyse}]]</title>
</head>
<body>
<section layout:fragment="content">
    <th:block
            th:insert="~{fragments/elements/pagetitle::pageTitleList(#{label.title.analyse},'/admin/analyse/description')}"></th:block>
    <hr/>

    <th:block th:insert="~{supplies-module/fragments/costing/costingSearch::costingSearch(true)}"></th:block>
    <hr/>

    <form action="/admin/analyse/delete" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" id="analyseDescriptionId" name="analyseDescriptionId" th:value="${analyseDescriptionId}"/>
        <div class="grid">
            <div>
                <input type="submit" role="button" name="_delete" value="Delete">
            </div>
            <div>
                <input type="submit" role="button" name="_update" value="Update">
            </div>
        </div>
        <hr/>
        <th:block th:insert="~{sales-module/analyse/analyse/analysetable}"></th:block>
    </form>
</section>
