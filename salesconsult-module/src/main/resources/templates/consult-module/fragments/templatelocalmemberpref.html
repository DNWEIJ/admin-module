<th:block th:fragment="template(name, list)">
    <div><h6><strong>Consult comments</strong></h6></div>
    <div class="grid-row">
        <div class="supersmall align-center">
            <th:block th:insert="~{fragments/elements/select::checkBox('overwriteText','','true','0')}"
                      th:with="placement='right',tooltip=#{visit.template.overwrite}, switch='switch'"></th:block>
        </div>
        <div>
            <select th:id="${name}" th:name="${name}">
                <th:block th:each="element : ${list}">
                    <option th:data-element="${element.text}" th:utext="${element.title}"
                            th:value="${element.title}" th:selected="${element.selected}"></option>
                </th:block>
            </select>
        </div>
    </div>
    <div class="grid-row">
    <textarea cols="110" id="comments" name="comments" rows="10" th:utext="${visit.comments}"></textarea>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById("template").addEventListener("change", function () {
                if (document.getElementById("overwriteText").checked) {
                    document.getElementById("comments").value =
                        this.selectedOptions[0].dataset.element || "";
                }
            });
        });
    </script>
</th:block>
